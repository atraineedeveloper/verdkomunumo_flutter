name: verdkomunumo_flutter
description: "Verdkomunumo - La Verda Komunumo. Red social para la comunidad Esperanto."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Supabase
  supabase_flutter: ^2.9.1

  # Navigation
  go_router: ^15.1.2

  # Images
  cached_network_image: ^3.4.1

  # Timestamps
  timeago: ^3.7.0

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.5

flutter:
  uses-material-design: true
  assets:
    - assets/images/
